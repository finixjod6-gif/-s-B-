<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Admin Access | RAJU HOST | Emerald Zone</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

    :root {
      --admin-accent: #00e676;
      --admin-accent-dark: #00c853;
      --admin-glow: rgba(0, 230, 118, 0.4);
      --bg: #050505;
      --glass: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(0, 230, 118, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(0, 200, 100, 0.1) 0%, transparent 45%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Hardware Accelerated Glass Card - Green Vibe */
    .admin-box {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 50px 40px;
      border-radius: 32px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(0, 230, 118, 0.25);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 230, 118, 0.1);
      position: relative;
      will-change: transform;
    }

    /* Top Progress Loader - Green Energy */
    .loader {
      position: absolute; top: 0; left: 0; width: 100%; height: 4px;
      background: rgba(255,255,255,0.05); display: none; overflow: hidden;
      border-radius: 32px 32px 0 0;
    }
    .fill { height: 100%; background: var(--admin-accent); width: 0%; box-shadow: 0 0 15px var(--admin-accent); transition: width 0.4s; }

    .brand-icon {
      width: 70px; height: 70px;
      background: rgba(0, 230, 118, 0.12);
      border-radius: 20px;
      border: 1px solid rgba(0, 230, 118, 0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 25px; font-size: 32px; color: var(--admin-accent);
      text-shadow: 0 0 20px var(--admin-glow);
      transition: 0.3s;
    }

    h2 { color: #fff; font-size: 26px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    h2 i { color: var(--admin-accent); font-size: 24px; margin-right: 6px; }
    p.desc { color: #a1a1a6; font-size: 14px; margin-bottom: 35px; border-left: 2px solid var(--admin-accent); padding-left: 12px; display: inline-block; }

    .input-wrapper { position: relative; margin-bottom: 20px; }
    
    .input-wrapper i {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: #5a5a60; font-size: 18px; transition: 0.3s;
    }

    input {
      width: 100%; padding: 16px 16px 16px 52px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px; color: #fff; font-size: 15px;
      outline: none; transition: 0.3s;
    }

    input:focus {
      border-color: var(--admin-accent);
      background: rgba(0, 230, 118, 0.05);
      box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
    }

    input:focus + i { color: var(--admin-accent); }

    button {
      background: linear-gradient(135deg, #00e676, #00b248);
      color: #0a0f0a; border: none; width: 100%; padding: 18px;
      border-radius: 16px; font-weight: 800; font-size: 16px;
      cursor: pointer; transition: 0.3s; margin-top: 10px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px var(--admin-glow);
      filter: brightness(1.05);
      background: linear-gradient(135deg, #00c853, #009624);
    }

    button:active { transform: scale(0.98); }

    /* Custom Admin Toast - Green Theme */
    .admin-toast {
        background: rgba(10, 20, 12, 0.95) !important;
        backdrop-filter: blur(15px) !important;
        border: 1px solid rgba(0, 230, 118, 0.5) !important;
        border-radius: 18px !important;
        color: #e0ffe6 !important;
        font-weight: 600;
    }
    .swal2-icon.swal2-success { border-color: #00e676 !important; color: #00e676 !important; }
    .swal2-styled.swal2-confirm { background: #00e676 !important; color: #0a0f0a !important; font-weight: bold; }
  </style>
</head>
<body>

  <div class="admin-box">
    <div class="loader" id="ldBox"><div class="fill" id="ldBar"></div></div>
    
    <div class="brand-icon">
      <i class="fas fa-leaf"></i>
    </div>

    <h2><i class="fas fa-shield-alt"></i> Admin Portal</h2>
    <p class="desc">⚡ green authority zone ⚡</p>

    <form method="POST" id="adminForm" onsubmit="handleAdminLogin(event)">
      <div class="input-wrapper">
        <input name="username" id="adminUser" placeholder="Admin Username" required autocomplete="off">
        <i class="fas fa-user-astronaut"></i>
      </div>
      
      <div class="input-wrapper">
        <input name="password" id="adminPass" type="password" placeholder="Master Password" required>
        <i class="fas fa-fingerprint"></i>
      </div>
      
      <button type="submit" id="btnTxt">
        <i class="fas fa-unlock-alt"></i> Authorize Access
      </button>
    </form>
  </div>

  <script>
    // GREEN ADMIN LOGIC with animation + demo credentials (admin / green123)
    async function handleAdminLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnTxt');
      const ldBox = document.getElementById('ldBox');
      const ldBar = document.getElementById('ldBar');
      const usernameInput = document.getElementById('adminUser');
      const passwordInput = document.getElementById('adminPass');
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      
      // Reset style
      ldBox.style.display = 'block';
      btn.disabled = true;
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying greenprint...';
      
      let w = 0;
      const progress = setInterval(() => {
          if(w < 85) { w += 15; ldBar.style.width = w + '%'; }
      }, 90);
      
      // Simulate async check (backend ready) - credentials: Admin "admin" / "green123" OR "rajuhost" / "emerald2025"
      setTimeout(() => {
          clearInterval(progress);
          ldBar.style.width = '100%';
          
          // All green authentication (any user can use default admin access for demo)
          if( (username === "admin" && password === "green123") || 
              (username === "rajuhost" && password === "emerald2025") ||
              (username === "Raju" && password === "greenpower") ||
              (username === "root" && password === "green@2025") ) {
              
              // success green toast + redirect simulation
              Swal.fire({
                  icon: 'success',
                  title: 'Access Granted ☠️',
                  text: 'Welcome to the green admin dashboard.',
                  background: '#0a1a0e',
                  backdrop: `rgba(0,0,0,0.85)`,
                  color: '#d0ffd0',
                  confirmButtonColor: '#00e676',
                  confirmButtonText: '<i class="fas fa-tree"></i> Proceed',
                  customClass: { popup: 'admin-toast' }
              }).then(() => {
                  // redirect to index or dashboard (optional simulated redirect)
                  window.location.href = "/dashboard";
              });
          } else {
              // Invalid attempt: animated error
              ldBox.style.display = 'none';
              btn.disabled = false;
              btn.innerHTML = originalText;
              ldBar.style.width = '0%';
              
              Swal.fire({
                  toast: true,
                  position: 'top-end',
                  showConfirmButton: false,
                  timer: 3200,
                  icon: 'error',
                  title: '🌱 Access Denied',
                  text: 'Invalid admin credentials. Unauthorized area.',
                  customClass: { popup: 'admin-toast' },
                  background: '#141814',
                  color: '#ffb3b3'
              });
              
              // shake effect on box
              const box = document.querySelector('.admin-box');
              box.style.animation = 'shakeBox 0.4s ease-in-out 0s 2';
              setTimeout(() => { box.style.animation = ''; }, 500);
          }
      }, 1200);
    }
    
    // Additional keyframe for shaking effect
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      @keyframes shakeBox {
        0% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
        100% { transform: translateX(0); }
      }
      .admin-box {
        transition: all 0.2s;
      }
      input:-webkit-autofill,
      input:-webkit-autofill:focus {
        transition: background-color 0s 600000s, color 0s 600000s;
      }
    `;
    document.head.appendChild(styleSheet);
    
    // Floating green particle effect simulation (lightweight)
    const bodyEl = document.body;
    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('green-particle');
      particle.innerHTML = '☠️';
      particle.style.position = 'fixed';
      particle.style.fontSize = Math.random() * 12 + 8 + 'px';
      particle.style.left = Math.random() * window.innerWidth + 'px';
      particle.style.top = window.innerHeight + 'px';
      particle.style.opacity = '0.5';
      particle.style.pointerEvents = 'none';
      particle.style.zIndex = '9999';
      particle.style.transition = 'all 4s linear';
      bodyEl.appendChild(particle);
      setTimeout(() => {
        particle.style.transform = `translateY(-${window.innerHeight + 50}px) rotate(15deg)`;
        particle.style.opacity = '0';
      }, 20);
      setTimeout(() => particle.remove(), 4500);
    }
    setInterval(createParticle, 1800);
  </script>
</body>
</html>
