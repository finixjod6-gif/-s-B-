<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>GREEN DASH | RAJU HOST • EMERALD CORE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root { 
      --bg: #0a1208; 
      --card: rgba(18, 35, 18, 0.65); 
      --accent: #00e676; 
      --accent-dark: #00c853;
      --border: rgba(0, 230, 118, 0.2); 
      --text-main: #e2ffe2;
      --text-dim: #b3ffc9;
      --glass: blur(14px);
      --terminal-bg: #0a1308;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body { 
        margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main);
        background-image: radial-gradient(circle at 0% 0%, rgba(0, 230, 118, 0.08) 0%, transparent 50%);
        min-height: 100vh; overflow-x: hidden;
    }

    .topbar { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(10, 18, 8, 0.85); backdrop-filter: var(--glass); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0, 230, 118, 0.25); }
    .logo-box { display: flex; align-items: center; gap: 10px; font-weight: 800; background: linear-gradient(135deg, #aaffaa, #00e676); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo-icon { background: linear-gradient(135deg, #00e676, #009624); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #0a1a08; box-shadow: 0 0 12px rgba(0,230,118,0.3); }

    .container { padding: 20px 15px; max-width: 800px; margin: auto; }

    /* Terminal Green Edition */
    #console-wrapper { background: var(--terminal-bg); border-radius: 12px; border: 1px solid rgba(0, 230, 118, 0.3); overflow: hidden; margin-bottom: 15px; }
    .terminal-header { background: #0f200c; padding: 8px 15px; border-bottom: 1px solid rgba(0, 230, 118, 0.2); display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono'; font-size: 10px; color: #b0ffb0; }
    #console { height: 300px; padding: 15px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5; color: #c7ffc7; background: #071203; }
    .terminal-input-area { background: #0e1c0b; padding: 10px 15px; border-top: 1px solid rgba(0, 230, 118, 0.2); display: flex; align-items: center; gap: 10px; }
    .terminal-input-area input { background: transparent; border: none; color: #00e676; flex: 1; font-family: 'JetBrains Mono'; font-size: 13px; outline: none; }
    .log-line { margin-bottom: 2px; }
    .log-time { color: #74ff7c; margin-right: 8px; }

    .srv-card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0, 230, 118, 0.25); transition: 0.3s; backdrop-filter: var(--glass); }
    .srv-card:hover { border-color: #00e676; background: rgba(0, 230, 118, 0.08); transform: translateY(-2px); }
    .btn { padding: 10px 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; transition: 0.2s; }
    .btn:active { transform: scale(0.96); }
    .btn-blue { background: var(--accent); color: #0a1f0a; box-shadow: 0 2px 10px rgba(0,230,118,0.3); }
    .btn-gray { background: #1a2e18; color: #b9ffbc; border: 1px solid rgba(0, 230, 118, 0.3); }

    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(0, 230, 118, 0.1); cursor: pointer; }
    .file-item:hover { background: #00e67610; }
    .menu-overlay { position: fixed; inset: 0; background: rgba(0,15,0,0.85); display: none; z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
    .menu-content { background: #122010; width: 280px; border-radius: 20px; border: 1px solid rgba(0, 230, 118, 0.4); }
    .menu-item { padding: 14px 20px; color: #e2ffe2; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(0,230,118,0.1); }
    .menu-item:hover { background: #1e3a1a; }
    
    #editor { display:none; position:fixed; inset:0; background:var(--bg); z-index:6000; padding:15px; }
    .CodeMirror { height: 85vh; border-radius: 12px; font-size: 14px; border: 1px solid #00e67640; }
  </style>
</head>
<body>

<div class="topbar">
    <div class="logo-box">
        <div class="logo-icon"><i class="fas fa-seedling"></i></div>
        <span>☠️ RAJU GREEN HOST</span>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-gray" onclick="location.href='/logout'"><i class="fas fa-leaf"></i> EXIT</button>
    </div>
</div>

<div class="container" id="homeView">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#c3ffc3;"><i class="fas fa-cubes"></i> Instances</h2>
        <button class="btn btn-blue" onclick="createServer()"><i class="fas fa-plus-circle"></i> Create</button>
    </div>
    <div id="srvList"></div>
</div>

<div class="container" id="manageView" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button class="btn btn-gray" onclick="location.reload()"><i class="fas fa-arrow-left"></i> Back</button>
        <div id="vUptime" style="font-size:11px; font-family:'JetBrains Mono'; color:#aaffaa;">🌱 OFFLINE</div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
        <button class="btn btn-blue" style="justify-content:center" onclick="srvAction('start')"><i class="fas fa-play"></i> START</button>
        <button class="btn btn-gray" style="justify-content:center" onclick="srvAction('restart')"><i class="fas fa-sync-alt"></i> RESTART</button>
        <button class="btn btn-gray" style="justify-content:center; color:#ffaa7a" onclick="srvAction('stop')"><i class="fas fa-stop"></i> STOP</button>
    </div>

    <!-- 🟢 Delete server button -->
    <div style="margin-top: 10px; margin-bottom: 15px;">
        <button class="btn btn-gray" style="justify-content:center; color:#ffaa7a; width:100%;" onclick="deleteServer()">
            <i class="fas fa-trash-alt"></i> DELETE ENVIRONMENT
        </button>
    </div>

    <div id="console-wrapper">
        <div class="terminal-header">
            <span><i class="fas fa-terminal"></i> GREEN CONSOLE</span>
            <span id="vSrvName" style="color:#00e676">-</span>
        </div>
        <div id="console"></div>
        <div class="terminal-input-area">
            <span style="color:#00e676; font-weight:bold;">&gt;_</span>
            <input type="text" id="termCmd" placeholder="python bot.py ..." onkeydown="if(event.key==='Enter') sendConsoleCommand()">
        </div>
    </div>

    <div style="background:var(--card); border-radius:18px; border:1px solid rgba(0,230,118,0.25); overflow:hidden;">
        <div style="padding:15px; background:rgba(0,230,118,0.05); border-bottom:1px solid rgba(0,230,118,0.2); display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:800; font-size:13px;"><i class="fas fa-folder-tree"></i> FILE FOREST</span>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-gray" style="padding:5px 10px" onclick="document.getElementById('fUp').click()"><i class="fas fa-cloud-upload-alt"></i></button>
                <button class="btn btn-gray" style="padding:5px 10px" onclick="createNew('file')"><i class="fas fa-file-alt"></i></button>
                <input type="file" id="fUp" hidden onchange="uploadFile(this)">
            </div>
        </div>
        <div id="fileList"></div>
    </div>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="this.style.display='none'">
    <div class="menu-content" onclick="event.stopPropagation()">
        <div class="menu-item" id="btnEdit"><i class="fas fa-edit"></i> Edit File</div>
        <div class="menu-item" id="btnRename"><i class="fas fa-pen-fancy"></i> Rename</div>
        <div class="menu-item" id="btnZip"><i class="fas fa-file-archive"></i> Archive</div>
        <div class="menu-item" id="btnUnzip"><i class="fas fa-box-open"></i> Unzip</div>
        <div class="menu-item" id="btnDelete" style="color:#ffaa7a"><i class="fas fa-trash"></i> Delete</div>
    </div>
</div>

<div id="editor">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span id="edFile" style="font-family:'JetBrains Mono'; font-size:13px; color:#b3ffb3;"></span>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-gray" onclick="closeEditor()">CLOSE</button>
            <button class="btn btn-blue" onclick="saveFile()">SAVE</button>
        </div>
    </div>
    <textarea id="edText"></textarea>
</div>

<script>
let curSrv = null; 
let logItv = null; 
let currentSubPath = ""; 
let editorInstance = null;

async function loadSrv() {
    try {
        const r = await fetch('/servers'); 
        const d = await r.json();
        document.getElementById('srvList').innerHTML = d.servers.map(s => `
            <div class="srv-card animate__animated animate__fadeInUp">
                <div onclick='openSrv(${JSON.stringify(s)})' style="cursor:pointer; flex:1">
                    <div style="font-weight:800; font-size:16px;"><i class="fas fa-database"></i> ${s.name}</div>
                    <div style="font-size:11px; color:#9ed69e; margin-top:4px;">📁 ${s.folder}</div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:10px; color:${s.online?'#32ff77':'#7faa7f'}">${s.online?'🟢 ACTIVE':'⚫ OFFLINE'}</div>
                    <div style="font-size:9px; color:#7a9e7a; margin-top:5px;">${s.cpu} | ${s.ram}</div>
                </div>
            </div>`).join('');
    } catch (e) {
        console.error('green load error', e);
    }
}

function openSrv(s) {
    curSrv = s; 
    document.getElementById('homeView').style.display='none'; 
    document.getElementById('manageView').style.display='block';
    document.getElementById('vSrvName').innerText = s.name;
    loadFiles(); 
    startLogs();
}

async function unzipAction(name) {
    Swal.fire({title:'☠️ Extracting...', allowOutsideClick:false, didOpen:()=>Swal.showLoading(), background:'#0e1a0c', color:'#e2ffe2'});
    try {
        const res = await fetch(`/files/unzip/${curSrv.folder}`, {
            method:'POST', 
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({name: name, path: currentSubPath})
        });
        const d = await res.json(); 
        Swal.close();
        if(d.status==='success'){ 
            loadFiles(); 
            Swal.fire({toast:true, position:'top-end', icon:'success', title:'🌱 Extracted!', timer:2000, background:'#1a2e18', color:'#d0ffd0', showConfirmButton:false}); 
        } else { 
            Swal.fire({icon:'error', title:'Extract Error', text:d.msg || 'Failed', background:'#1a2e18', color:'#ffd0aa'}); 
        }
    } catch (e) {
        Swal.close();
        Swal.fire({icon:'error', title:'Connection', text:'Server unreachable', background:'#1a2e18', color:'#ffd0aa'});
    }
}

function startLogs() {
    if(logItv) clearInterval(logItv);
    logItv = setInterval(async () => {
        if(!curSrv) return;
        try {
            const r = await fetch(`/server/log/${curSrv.folder}`); 
            const d = await r.json();
            const c = document.getElementById('console');
            if(d.log && d.log !== c.getAttribute('data-raw')) {
                c.setAttribute('data-raw', d.log);
                c.innerHTML = d.log.split('\n').map(l => l.trim() ? `<div class="log-line"><span class="log-time">[${new Date().toLocaleTimeString()}]</span>${l}</div>` : '').join('');
                c.scrollTop = c.scrollHeight;
            }
            document.getElementById('vUptime').innerHTML = d.online ? `🟢 UPTIME: ${d.uptime}` : '🌑 OFFLINE';
        } catch (e) {}
    }, 2000);
}

async function loadFiles() {
    try {
        const r = await fetch(`/files/list/${curSrv.folder}?path=${encodeURIComponent(currentSubPath)}`); 
        const d = await r.json();
        document.getElementById('fileList').innerHTML = d.map(f => `
            <div class="file-item" onclick="${f.is_dir ? `enterFolder('${f.name}')` : ''}">
                <span><i class="fas ${f.is_dir?'fa-folder-open':'fa-file-code'}"></i> ${f.name}</span>
                <i class="fas fa-ellipsis-h" onclick="event.stopPropagation(); openFileMenu('${f.name}', ${f.is_zip}, ${f.is_dir})"></i>
            </div>`).join('');
    } catch (e) {}
}

function openFileMenu(name, isZip, isDir) {
    document.getElementById('btnEdit').style.display = isDir ? 'none' : 'flex';
    document.getElementById('btnUnzip').style.display = isZip ? 'flex' : 'none';
    document.getElementById('btnEdit').onclick = () => editFile(name);
    document.getElementById('btnUnzip').onclick = () => unzipAction(name);
    document.getElementById('btnDelete').onclick = () => deleteFile(name);
    document.getElementById('btnRename').onclick = () => renameFile(name);
    document.getElementById('menuOverlay').style.display = 'flex';
}

function enterFolder(n) { 
    currentSubPath += (currentSubPath===""?"":"/")+n; 
    loadFiles(); 
}

async function srvAction(a) { 
    try {
        await fetch(`/server/action/${curSrv.folder}/${a}`, {method:'POST'}); 
    } catch (e) {}
}

async function deleteServer() {
    const confirm = await Swal.fire({
        title: '☠️ Permanently Delete?',
        text: 'All files, data, and bot processes will be lost. This action is irreversible.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff7a4a',
        cancelButtonColor: '#2a6e2a',
        confirmButtonText: 'Yes, purge',
        background: '#122010',
        color: '#ffddc0'
    });

    if (confirm.isConfirmed) {
        try {
            const res = await fetch(`/server/delete/${curSrv.folder}`, { method: 'POST' });
            const data = await res.json();
            if (data.status === 'deleted') {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'Server deleted',
                    showConfirmButton: false,
                    timer: 2000,
                    background: '#1a2e18',
                    color: '#d0ffd0'
                });
                document.getElementById('manageView').style.display = 'none';
                document.getElementById('homeView').style.display = 'block';
                loadSrv();
            } else {
                Swal.fire({ icon: 'error', title: 'Error', text: data.msg || 'Could not delete', background: '#1a2e18', color: '#ffd0aa' });
            }
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'Network error', text: 'Please try again', background: '#1a2e18', color: '#ffd0aa' });
        }
    }
}

async function createServer() {
    const { value: n } = await Swal.fire({
        title: '🌱 New Server Name',
        input: 'text',
        background: '#122010',
        color: '#e2ffe2',
        inputValidator: (value) => !value ? 'Plant a name!' : null
    });
    if (n) {
        try {
            const res = await fetch('/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: n })
            });
            const data = await res.json();
            if (data.status === 'success') {
                loadSrv();
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: data.msg || 'Created!', showConfirmButton: false, timer: 2000, background: '#1a2e18', color: '#d0ffd0' });
            } else {
                Swal.fire({ icon: 'error', title: 'Failed', text: data.msg || 'Unknown error', background: '#1a2e18', color: '#ffd0aa' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Network Error', text: 'Could not reach server', background: '#1a2e18', color: '#ffd0aa' });
        }
    }
}

async function editFile(n) {
    try {
        const res = await fetch(`/files/read/${curSrv.folder}?name=${encodeURIComponent(n)}&path=${encodeURIComponent(currentSubPath)}`);
        const data = await res.json();
        document.getElementById('edFile').innerText = n;
        document.getElementById('edText').value = data.content;
        document.getElementById('editor').style.display = 'block';
        if(!editorInstance) {
            editorInstance = CodeMirror.fromTextArea(document.getElementById('edText'), { mode: "python", theme: "dracula", lineNumbers: true });
        } else { 
            editorInstance.setValue(data.content); 
        }
    } catch (e) {
        Swal.fire({ icon: 'error', title: 'Read Error', text: 'Cannot open file', background: '#1a2e18', color: '#ffd0aa' });
    }
}

async function saveFile() {
    const n = document.getElementById('edFile').innerText;
    const c = editorInstance.getValue();
    try {
        await fetch(`/files/save/${curSrv.folder}`, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ name: n, content: c, path: currentSubPath })
        });
        closeEditor(); 
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Saved!', timer: 2000, background: '#1a2e18', color: '#d0ffd0', showConfirmButton: false });
    } catch (e) {
        Swal.fire({ icon: 'error', title: 'Save Error', text: 'Could not save', background: '#1a2e18', color: '#ffd0aa' });
    }
}

async function uploadFile(input) {
    if(!input.files[0]) return;
    let fd = new FormData(); 
    fd.append("file", input.files[0]); 
    fd.append("path", currentSubPath);
    try {
        await fetch(`/files/upload/${curSrv.folder}`, { method: 'POST', body: fd }); 
        loadFiles(); 
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Uploaded', timer: 2000, background: '#1a2e18', color: '#d0ffd0', showConfirmButton: false });
    } catch (e) {
        Swal.fire({ icon: 'error', title: 'Upload fail', text: 'Error during upload', background: '#1a2e18', color: '#ffd0aa' });
    }
}

async function createNew(type) {
    const { value: n } = await Swal.fire({ title: `New ${type}`, input: 'text', background: '#122010', color: '#e2ffe2' });
    if (n) {
        const url = type === 'file' ? `/files/create-file/${curSrv.folder}` : `/files/create-folder/${curSrv.folder}`;
        try {
            await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: n, path: currentSubPath }) });
            loadFiles();
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Creation failed', background: '#1a2e18', color: '#ffd0aa' });
        }
    }
}

async function deleteFile(n) {
    const res = await Swal.fire({ title: 'Delete?', text: n, icon: 'warning', showCancelButton: true, background: '#122010', color: '#e2ffe2' });
    if (res.isConfirmed) {
        try {
            await fetch(`/files/delete-bulk/${curSrv.folder}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ names: [n], path: currentSubPath }) });
            loadFiles();
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Delete failed', background: '#1a2e18', color: '#ffd0aa' });
        }
    }
}

async function renameFile(n) {
    const { value: newName } = await Swal.fire({ title: 'Rename', input: 'text', inputValue: n, background: '#122010', color: '#e2ffe2', inputValidator: (value) => !value ? 'Name required!' : null });
    if (newName && newName !== n) {
        try {
            await fetch(`/files/rename/${curSrv.folder}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ old: n, new: newName, path: currentSubPath }) });
            loadFiles();
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'Rename Error', text: 'Could not rename', background: '#1a2e18', color: '#ffd0aa' });
        }
    }
}

function sendConsoleCommand() {
    const cmd = document.getElementById('termCmd').value;
    if (cmd) { 
        fetch(`/server/command/${curSrv.folder}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ command: cmd }) }); 
        document.getElementById('termCmd').value = ''; 
    }
}

function closeEditor() { 
    document.getElementById('editor').style.display = 'none'; 
}

document.addEventListener('DOMContentLoaded', loadSrv);
</script>
</body>
</html>
