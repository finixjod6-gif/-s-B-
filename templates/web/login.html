<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>GREEN ACCESS | RAJU=HOST ☠️</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --accent: #00e676;
            --accent-dark: #00c853;
            --accent-glow: rgba(0, 230, 118, 0.5);
            --bg: #050a05;
            --card-bg: rgba(10, 25, 8, 0.8);
            --border: rgba(0, 230, 118, 0.35);
            --input-bg: rgba(0, 230, 118, 0.08);
            --text-secondary: #b3ffb3;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #e2ffe2;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            position: relative;
        }

        /* 💀 Green Mesh Background with Skull Vibe */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }
        .orb-1 { width: 550px; height: 550px; background: #00c853; top: -15%; left: -15%; }
        .orb-2 { width: 450px; height: 450px; background: #00a344; bottom: -5%; right: -5%; animation-delay: -4s; }
        .orb-3 { width: 350px; height: 350px; background: #00e676; top: 45%; left: 35%; animation-duration: 22s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(80px, 40px) scale(1.25); }
        }

        /* 💀 Login Card - Green Glassmorphism */
        .login-card {
            width: 92%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1.5px solid var(--border);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 50, 0, 0.4);
            z-index: 10;
        }

        .brand-icon {
            width: 80px; height: 80px;
            background: linear-gradient(145deg, #1a2e1a, #0f200c);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: var(--accent);
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 30, 0, 0.3);
            position: relative;
        }

        /* Pulse effect for icon */
        .brand-icon::after {
            content: '';
            position: absolute; width: 100%; height: 100%;
            border-radius: 22px; border: 2px solid var(--accent);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        h2 { 
            font-size: 32px; font-weight: 800; letter-spacing: -1.2px; margin: 0 0 8px;
            background: linear-gradient(135deg, #aaffaa, #00e676);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle { 
            color: var(--text-secondary); 
            font-size: 13px; 
            margin-bottom: 35px; 
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-wrapper { position: relative; margin-bottom: 20px; }
        
        .input-wrapper i.main-icon {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: #6f9e6f; transition: 0.3s; font-size: 18px;
        }

        .input-wrapper input {
            width: 100%; padding: 16px 50px 16px 52px;
            background: var(--input-bg);
            border: 1px solid rgba(0, 230, 118, 0.3);
            border-radius: 18px; color: #e2ffe2; font-size: 15px;
            outline: none; transition: all 0.3s ease;
            font-weight: 500;
        }

        .input-wrapper input:focus {
            background: rgba(0, 230, 118, 0.12);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .input-wrapper input:focus ~ i.main-icon { color: var(--accent); }

        .pass-toggle {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            color: #6f9e6f; cursor: pointer; padding: 5px; transition: 0.2s;
        }
        .pass-toggle:hover { color: var(--accent); }

        .btn-submit {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #00e676, #009624);
            border: none; border-radius: 18px;
            color: #0a1a08; font-size: 16px; font-weight: 800;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(0, 230, 118, 0.4);
        }

        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.08); box-shadow: 0 15px 35px rgba(0, 230, 118, 0.5); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .footer-link { margin-top: 25px; font-size: 13px; color: #8fbc8f; }
        .footer-link a { color: #00e676; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .footer-link a:hover { opacity: 0.8; text-shadow: 0 0 8px #00e676; }

        /* Alert Styling */
        .swal2-green {
            background: rgba(10, 30, 8, 0.95) !important;
            backdrop-filter: blur(25px) !important;
            border-radius: 24px !important;
            border: 1px solid rgba(0, 230, 118, 0.5) !important;
            color: #dcffdc !important;
        }
        .swal2-confirm { background: #00e676 !important; color: #0a1f0a !important; font-weight: bold; }

        @media (max-width: 400px) {
            .login-card { padding: 30px 20px; }
            h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="mesh-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-card animate__animated animate__zoomIn">
        <div class="brand-icon">
            <i class="fa-solid fa-skull-crossbones"></i>
        </div>
        <h2>☠️ RAJU=HOST ☠️</h2>
        <p class="subtitle"><i class="fas fa-leaf"></i> Green Zone • Secure Access</p>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="input-wrapper">
                <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
                <i class="fa-solid fa-envelope-open-text main-icon"></i>
            </div>
            
            <div class="input-wrapper">
                <input type="password" name="password" id="passInput" placeholder="Password" required>
                <i class="fa-solid fa-key main-icon"></i>
                <i class="fa-solid fa-eye-slash pass-toggle" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span><i class="fas fa-skull"></i> Secure Sign In</span>
                <i class="fa-solid fa-chevron-right" style="font-size: 14px;"></i>
            </button>
        </form>

        <div class="footer-link">
            💀 New here? <a href="/signup">Create an account</a>
        </div>
    </div>

    <script>
        // Smooth Password Toggle
        function togglePassword() {
            const input = document.getElementById('passInput');
            const icon = document.querySelector('.pass-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('i:last-child');
            
            btn.disabled = true;
            btnText.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying...';
            btnIcon.style.display = 'none';

            try {
                const formData = new FormData(e.target);
                const response = await fetch('/login', { 
                    method: 'POST', 
                    body: formData 
                });

                const data = await response.json();

                if (response.status === 200) {
                    Swal.fire({
                        icon: 'success', 
                        title: '☠️ Green Access Granted', 
                        text: 'Redirecting to your dashboard...',
                        timer: 2000, 
                        showConfirmButton: false, 
                        customClass: { popup: 'swal2-green' }
                    });
                    setTimeout(() => window.location.href = data.url, 1800);
                } 
                else if (response.status === 403) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Access Restricted',
                        text: data.msg || 'This account has been flagged and suspended.',
                        showCancelButton: true,
                        confirmButtonText: '<i class="fa-brands fa-telegram"></i> Appeal Access',
                        cancelButtonText: 'Close',
                        customClass: { popup: 'swal2-green' }
                    }).then((result) => {
                        if (result.isConfirmed) window.open('https://t.me/rxrajuahmmed', '_blank');
                    });
                    reset();
                } 
                else {
                    Swal.fire({ 
                        icon: 'warning', 
                        title: 'Auth Failed', 
                        text: data.msg || 'Invalid credentials provided.', 
                        customClass: { popup: 'swal2-green' }
                    });
                    reset();
                }
            } catch (err) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'System Error', 
                    text: 'Unable to reach the server. Please try again.', 
                    customClass: { popup: 'swal2-green' }
                });
                reset();
            }

            function reset() {
                btn.disabled = false;
                btnText.innerHTML = '<i class="fas fa-skull"></i> Secure Sign In';
                btnIcon.style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
